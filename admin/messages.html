<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Messages — Choice Properties Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="/config.js"></script><link rel="stylesheet" href="/css/main.css?v=3">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/css/admin.css?v=2">
  <link rel="stylesheet" href="/css/mobile.css?v=4">
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
.thread{background:var(--surface2);border:1px solid var(--color-border);border-radius:8px;margin-bottom:12px;overflow:hidden}
.thread-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.thread-header:hover{background:rgba(201,168,76,.05)}
.thread-body{padding:16px;border-top:1px solid var(--color-border);display:none}
.thread-body.open{display:block}
.msg{margin-bottom:10px;padding:10px 12px;border-radius:6px;font-size:.8rem;line-height:1.6}
.msg-admin{background:rgba(201,168,76,.08);border-left:3px solid var(--color-brand-light)}
.msg-tenant{background:rgba(59,130,246,.06);border-left:3px solid var(--info)}
.msg-meta{font-size:.65rem;color:var(--muted);margin-bottom:4px}
.reply-row{display:flex;gap:8px;margin-top:12px}
.reply-row textarea{flex:1;height:60px;font-size:.8rem}
</style><link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
</head><body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="adminSidebar"><div class="sidebar-logo"><div class="name">Choice Properties</div><div class="sub">Admin Portal</div></div>
<nav><div class="nav-section">Overview</div><a class="nav-item" href="dashboard.html"><span class="icon">⊞</span> Dashboard</a>
<div class="nav-section">Applications</div><a class="nav-item" href="applications.html"><span class="icon">📋</span> All Applications</a>
<a class="nav-item" href="leases.html"><span class="icon">📄</span> Leases</a><a class="nav-item" href="move-ins.html"><span class="icon">🏠</span> Move-Ins</a>
<a class="nav-item active" href="messages.html"><span class="icon">💬</span> Messages</a>
<div class="nav-section">Platform</div><a class="nav-item" href="landlords.html"><span class="icon">👤</span> Landlords</a>
<a class="nav-item" href="listings.html"><span class="icon">🏢</span> Listings</a><a class="nav-item" href="email-logs.html"><span class="icon">📧</span> Email Logs</a></nav>
<div class="sidebar-footer"><a href="/index.html" target="_blank" style="display:block;font-size:12px;color:#8892a2;text-decoration:none;margin-bottom:8px;text-align:center"><i class="fas fa-external-link-alt" style="margin-right:4px"></i> View Live Site</a>
    <div class="admin-name" id="admin-name">Loading…</div>
    <button class="sign-out" onclick="CP.sb().auth.signOut().then(()=>location.href='login.html')">Sign Out</button></div></aside>
<div class="main"><div class="topbar">
    <button class="mobile-menu-btn" id="menuBtn" aria-label="Open menu"><i class="fas fa-bars"></i></button><div><div class="page-title">Tenant Messages</div><div class="page-sub">All admin ↔ tenant message threads</div></div></div>
<div class="content"><div id="threads"><div class="empty-state" style="padding:48px 0;text-align:center;color:var(--muted)">Loading…</div></div></div></div>
<script type="module" src="/js/cp-api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async()=>{
  const ok = await CP.Auth.requireAdmin();
  if (!ok) return;
  const user=await CP.Auth.getUser(); document.getElementById('admin-name').textContent=user?.email||'Admin';
  const {data:msgs}=await CP.sb().from('messages').select('*,applications(first_name,last_name,email,app_id)').order('created_at',{ascending:false});
  if(!msgs?.length){document.getElementById('threads').innerHTML='<div class="empty-state"><div class="empty-icon">💬</div>No messages yet.</div>';return;}
  // Group by app_id
  const threads={};
  msgs.forEach(m=>{const id=m.app_id;if(!threads[id])threads[id]={app:m.applications,msgs:[]};threads[id].msgs.push(m);});
  document.getElementById('threads').innerHTML=Object.entries(threads).map(([appId,t])=>`
    <div class="thread">
      <div class="thread-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div><strong>${t.app?.first_name||''} ${t.app?.last_name||''}</strong> <span class="mono text-muted">${appId}</span><br><span style="font-size:.72rem;color:var(--muted2)">${t.app?.email||''}</span></div>
        <div style="font-size:.72rem;color:var(--muted)">${t.msgs.length} message${t.msgs.length!==1?'s':''} · ${CP.UI.fmt.dateTime(t.msgs[0].created_at)}</div>
      </div>
      <div class="thread-body">
        ${[...t.msgs].reverse().map(m=>`<div class="msg msg-${m.sender}">
          <div class="msg-meta">${m.sender_name||m.sender} · ${CP.UI.fmt.dateTime(m.created_at)}</div>
          ${CP_esc(m.message)}
        </div>`).join('')}
        <div class="reply-row">
          <textarea id="reply-${appId}" placeholder="Type reply…"></textarea>
          <button class="btn btn-primary btn-sm" onclick="sendReply('${appId}')">Send</button>
        </div>
      </div>
    </div>`).join('');
});
async function sendReply(appId){
  const ta=document.getElementById('reply-'+appId);
  const msg=ta.value.trim(); if(!msg)return;
  const res=await CP.Applications.sendMessage(appId,msg,'admin','Choice Properties');
  if(res.success){ta.value='';CP.UI.toast('Message sent','success');}
  else CP.UI.toast('Error: '+res.error,'error');
}
</script>
<script>
// Mobile sidebar toggle
(function(){
  var btn = document.getElementById('menuBtn');
  var sidebar = document.getElementById('adminSidebar');
  var overlay = document.getElementById('sidebarOverlay');
  if(!btn) return;
  function open(){ sidebar.classList.add('open'); overlay.classList.add('open'); }
  function close(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); }
  btn.addEventListener('click', open);
  overlay.addEventListener('click', close);
  // sidebarToggle marker
})();
</script>
</body></html>
