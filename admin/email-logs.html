<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Email Logs — Choice Properties Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="/config.js"></script><link rel="stylesheet" href="/css/main.css?v=3">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/css/admin.css?v=2">
  <link rel="stylesheet" href="/css/mobile.css?v=4">
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
</head><body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="adminSidebar"><div class="sidebar-logo"><div class="name">Choice Properties</div><div class="sub">Admin Portal</div></div>
<nav><div class="nav-section">Overview</div><a class="nav-item" href="dashboard.html"><span class="icon">⊞</span> Dashboard</a>
<div class="nav-section">Applications</div><a class="nav-item" href="applications.html"><span class="icon">📋</span> All Applications</a>
<a class="nav-item" href="leases.html"><span class="icon">📄</span> Leases</a><a class="nav-item" href="move-ins.html"><span class="icon">🏠</span> Move-Ins</a>
<a class="nav-item" href="messages.html"><span class="icon">💬</span> Messages</a>
<div class="nav-section">Platform</div><a class="nav-item" href="landlords.html"><span class="icon">👤</span> Landlords</a>
<a class="nav-item" href="listings.html"><span class="icon">🏢</span> Listings</a>
<a class="nav-item active" href="email-logs.html"><span class="icon">📧</span> Email Logs</a></nav>
<div class="sidebar-footer"><a href="/index.html" target="_blank" style="display:block;font-size:12px;color:#8892a2;text-decoration:none;margin-bottom:8px;text-align:center"><i class="fas fa-external-link-alt" style="margin-right:4px"></i> View Live Site</a>
    <div class="admin-name" id="admin-name">Loading…</div>
    <button class="sign-out" onclick="CP.sb().auth.signOut().then(()=>location.href='login.html')">Sign Out</button></div></aside>
<div class="main"><div class="topbar">
    <button class="mobile-menu-btn" id="menuBtn" aria-label="Open menu"><i class="fas fa-bars"></i></button><div><div class="page-title">Email Logs</div><div class="page-sub">Full audit trail of all system emails</div></div></div>
<div class="content">
<div class="filter-bar">
<input type="text" id="f-app" placeholder="Filter by App ID…" oninput="applyFilter()">
<select id="f-type" onchange="applyFilter()"><option value="">All Types</option>
<option value="application_confirmation">Application Confirmation</option><option value="admin_notification">Admin Notification</option>
<option value="payment_confirmation">Payment Confirmation</option><option value="status_update">Status Update</option>
<option value="lease_sent">Lease Sent</option><option value="lease_signed_tenant">Lease Signed (Tenant)</option>
<option value="lease_signed_admin">Lease Signed (Admin)</option><option value="move_in_confirmation">Move-In Confirmation</option>
<option value="admin_message">Admin Message</option></select>
<select id="f-status" onchange="applyFilter()"><option value="">All Statuses</option><option value="success">Success</option><option value="sent">Sent</option><option value="failed">Failed</option></select>
</div>
<div class="card"><div class="table-wrap"><table>
<thead><tr><th>Date/Time</th><th>Type</th><th>Recipient</th><th>App ID</th><th>Status</th><th>Error</th></tr></thead>
<tbody id="tbody"><tr><td colspan="6" class="empty-state">Loading…</td></tr></tbody></table></div></div></div></div>
<script type="module" src="/js/cp-api.js"></script>
<script>
let all=[];
document.addEventListener('DOMContentLoaded', async()=>{
  const ok = await CP.Auth.requireAdmin();
  if (!ok) return;
  const user=await CP.Auth.getUser(); document.getElementById('admin-name').textContent=user?.email||'Admin';
  const params=new URLSearchParams(location.search);
  if(params.get('app')) document.getElementById('f-app').value=params.get('app');
  if(params.get('status')) document.getElementById('f-status').value=params.get('status');
  const {data}=await CP.sb().from('email_logs').select('*').order('created_at',{ascending:false}).limit(500);
  all=data||[]; applyFilter();
});
function applyFilter(){
  const app=document.getElementById('f-app').value.toLowerCase();
  const type=document.getElementById('f-type').value;
  const status=document.getElementById('f-status').value;
  let f=all.filter(l=>{
    if(type&&l.type!==type)return false;
    if(status&&l.status!==status)return false;
    if(app&&!(l.app_id||'').toLowerCase().includes(app))return false;
    return true;
  });
  const tb=document.getElementById('tbody');
  if(!f.length){tb.innerHTML='<tr><td colspan="6" class="empty-state">No logs found</td></tr>';return;}
  tb.innerHTML=f.map(l=>`<tr>
    <td class="text-muted" style="white-space:nowrap">${CP.UI.fmt.dateTime(l.created_at)}</td>
    <td><span class="mono" style="font-size:.72rem">${l.type}</span></td>
    <td>${l.recipient}</td>
    <td class="mono">${l.app_id||'—'}</td>
    <td>${l.status==='success'||l.status==='sent'?'<span class="badge badge-success">'+l.status+'</span>':'<span class="badge badge-danger">'+l.status+'</span>'}</td>
    <td class="text-danger" style="font-size:.72rem">${l.error_msg||''}</td>
  </tr>`).join('');
}
</script>
<script>
// Mobile sidebar toggle
(function(){
  var btn = document.getElementById('menuBtn');
  var sidebar = document.getElementById('adminSidebar');
  var overlay = document.getElementById('sidebarOverlay');
  if(!btn) return;
  function open(){ sidebar.classList.add('open'); overlay.classList.add('open'); }
  function close(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); }
  btn.addEventListener('click', open);
  overlay.addEventListener('click', close);
  // sidebarToggle marker
})();
</script>
</body></html>
