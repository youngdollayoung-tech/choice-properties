<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Landlords — Choice Properties Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/css/admin.css?v=2">
  <link rel="stylesheet" href="/css/mobile.css?v=4">
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
</head><body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="adminSidebar"><div class="sidebar-logo"><div class="name">Choice Properties</div><div class="sub">Admin Portal</div></div>
<nav><div class="nav-section">Overview</div><a class="nav-item" href="dashboard.html"><span class="icon">⊞</span> Dashboard</a>
<div class="nav-section">Applications</div><a class="nav-item" href="applications.html"><span class="icon">📋</span> All Applications</a>
<a class="nav-item" href="leases.html"><span class="icon">📄</span> Leases</a><a class="nav-item" href="move-ins.html"><span class="icon">🏠</span> Move-Ins</a>
<a class="nav-item" href="messages.html"><span class="icon">💬</span> Messages</a>
<div class="nav-section">Platform</div><a class="nav-item active" href="landlords.html"><span class="icon">👤</span> Landlords</a>
<a class="nav-item" href="listings.html"><span class="icon">🏢</span> Listings</a><a class="nav-item" href="email-logs.html"><span class="icon">📧</span> Email Logs</a></nav>
<div class="sidebar-footer"><a href="/index.html" target="_blank" style="display:block;font-size:12px;color:#8892a2;text-decoration:none;margin-bottom:8px;text-align:center"><i class="fas fa-external-link-alt" style="margin-right:4px"></i> View Live Site</a>
    <div class="admin-name" id="admin-name">Loading…</div>
    <button class="sign-out" onclick="CP.sb().auth.signOut().then(()=>location.href='login.html')">Sign Out</button></div></aside>
<div class="main"><div class="topbar">
    <button class="mobile-menu-btn" id="menuBtn" aria-label="Open menu"><i class="fas fa-bars"></i></button><div><div class="page-title">Landlord Accounts</div><div class="page-sub" id="count-label">Loading…</div></div></div>
<div class="content">
<div class="card"><div class="table-wrap"><table>
<thead><tr><th>Name / Business</th><th>Account Type</th><th>Email</th><th>Phone</th><th>State</th><th>Verified</th><th>Actions</th></tr></thead>
<tbody id="tbody"></tbody></table></div></div></div></div>
<script type="module" src="/js/cp-api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async()=>{
  const ok = await CP.Auth.requireAdmin();
  if (!ok) return;
  const user=await CP.Auth.getUser(); document.getElementById('admin-name').textContent=user?.email||'Admin';
  const {data}=await CP.sb().from('landlords').select('*').order('created_at',{ascending:false});
  document.getElementById('count-label').textContent=`${(data||[]).length} landlord accounts`;
  const tb=document.getElementById('tbody');
  if(!data?.length){tb.innerHTML='<tr><td colspan="7" class="empty-state">No landlords yet</td></tr>';return;}
  tb.innerHTML=data.map(l=>`<tr>
    <td><strong>${l.contact_name}</strong>${l.business_name?'<br><span class="text-muted" style="font-size:.72rem">'+l.business_name+'</span>':''}</td>
    <td><span class="badge badge-secondary">${l.account_type||'landlord'}</span></td>
    <td>${l.email}</td><td>${l.phone||'—'}</td><td>${l.state||'—'}</td>
    <td>${l.verified?'<span class="badge badge-success">Verified</span>':'<span class="badge badge-secondary">Unverified</span>'}</td>
    <td style="white-space:nowrap">
      <button class="btn btn-sm ${l.verified ? 'btn-ghost' : 'btn-success'}" onclick="toggleVerify('${l.id}',${l.verified})">${l.verified ? 'Unverify' : '✓ Verify'}</button>
      <span class="text-muted" style="font-size:.72rem;margin-left:8px">${CP.UI.fmt.date(l.created_at)}</span>
    </td>
  </tr>`).join('');
})();

async function toggleVerify(id, currentlyVerified) {
  const { error } = await CP.sb().from('landlords').update({ verified: !currentlyVerified }).eq('id', id);
  if (error) { CP.UI.toast('Error: ' + error.message, 'error'); return; }
  CP.UI.toast(currentlyVerified ? 'Landlord unverified.' : 'Landlord verified!', 'success');
  location.reload();
}
</script>
<script>
// Mobile sidebar toggle
(function(){
  var btn = document.getElementById('menuBtn');
  var sidebar = document.getElementById('adminSidebar');
  var overlay = document.getElementById('sidebarOverlay');
  if(!btn) return;
  function open(){ sidebar.classList.add('open'); overlay.classList.add('open'); }
  function close(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); }
  btn.addEventListener('click', open);
  overlay.addEventListener('click', close);
  // sidebarToggle marker
})();
</script>
</body></html>
