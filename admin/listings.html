<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Listings — Choice Properties Admin</title>
<script src="/config.js"></script><link rel="stylesheet" href="/css/main.css?v=3">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/css/admin.css?v=2">
  <link rel="stylesheet" href="/css/mobile.css?v=4">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
</head><body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="adminSidebar"><div class="sidebar-logo"><div class="name">Choice Properties</div><div class="sub">Admin Portal</div></div>
<nav><div class="nav-section">Overview</div><a class="nav-item" href="dashboard.html"><span class="icon">⊞</span> Dashboard</a>
<div class="nav-section">Applications</div><a class="nav-item" href="applications.html"><span class="icon">📋</span> All Applications</a>
<a class="nav-item" href="leases.html"><span class="icon">📄</span> Leases</a><a class="nav-item" href="move-ins.html"><span class="icon">🏠</span> Move-Ins</a>
<a class="nav-item" href="messages.html"><span class="icon">💬</span> Messages</a>
<div class="nav-section">Platform</div><a class="nav-item" href="landlords.html"><span class="icon">👤</span> Landlords</a>
<a class="nav-item active" href="listings.html"><span class="icon">🏢</span> Listings</a><a class="nav-item" href="email-logs.html"><span class="icon">📧</span> Email Logs</a></nav>
<div class="sidebar-footer"><a href="/index.html" target="_blank" style="display:block;font-size:12px;color:#8892a2;text-decoration:none;margin-bottom:8px;text-align:center"><i class="fas fa-external-link-alt" style="margin-right:4px"></i> View Live Site</a>
    <div class="admin-name" id="admin-name">Loading…</div>
    <button class="sign-out" onclick="CP.sb().auth.signOut().then(()=>location.href='login.html')">Sign Out</button></div></aside>
<div class="main"><div class="topbar">
    <button class="mobile-menu-btn" id="menuBtn" aria-label="Open menu"><i class="fas fa-bars"></i></button><div><div class="page-title">All Listings</div><div class="page-sub" id="count-label">Loading…</div></div></div>
<div class="content">
<div class="filter-bar">
<select id="f-status" onchange="load()"><option value="">All Statuses</option><option value="active">Active</option><option value="draft">Draft</option><option value="paused">Paused</option><option value="rented">Rented</option><option value="archived">Archived</option></select>
<input type="text" id="search" placeholder="Search title or address…" oninput="applyFilter()">
</div>
<div class="card"><div class="table-wrap"><table>
<thead><tr><th>Title</th><th>Address</th><th>Status</th><th>Rent/mo</th><th>Beds/Bath</th><th>Views</th><th>Applications</th><th>Landlord</th><th>Listed</th><th>Actions</th></tr></thead>
<tbody id="tbody"><tr><td colspan="10" class="empty-state">Loading…</td></tr></tbody></table></div></div></div></div>
<script type="module" src="/js/cp-api.js"></script>
<script>
let all=[];
document.addEventListener('DOMContentLoaded', async()=>{
  const ok = await CP.Auth.requireAdmin();
  if (!ok) return;
  const user=await CP.Auth.getUser(); document.getElementById('admin-name').textContent=user?.email||'Admin';
  await load();
});
async function load(){
  const status=document.getElementById('f-status').value;
  let q=CP.sb().from('properties').select('*,landlords(contact_name,business_name)').order('created_at',{ascending:false});
  if(status) q=q.eq('status',status);
  const {data}=await q; all=data||[]; applyFilter();
}
async function changeStatus(id, newStatus) {
  if (!newStatus) return;
  const {error} = await CP.sb().from('properties').update({status: newStatus}).eq('id', id);
  if (error) { CP.UI.toast('Failed: ' + error.message, 'error'); return; }
  CP.UI.toast('Status updated to ' + newStatus, 'success');
  await load();
}
function applyFilter(){
  const s=document.getElementById('search').value.toLowerCase();
  const f=all.filter(p=>!s||`${p.title} ${p.address}`.toLowerCase().includes(s));
  document.getElementById('count-label').textContent=`${f.length} listings`;
  const tb=document.getElementById('tbody');
  if(!f.length){tb.innerHTML='<tr><td colspan="10" class="empty-state">No listings found</td></tr>';return;}
  const statusBadge=s=>{const m={active:'badge-success',draft:'badge-secondary',paused:'badge-warning',rented:'badge-info',archived:'badge-secondary'};return`<span class="badge ${m[s]||'badge-secondary'}">${s}</span>`;};
  tb.innerHTML=f.map(p=>`<tr>
    <td><a href="/landlord/edit-listing.html?id=${p.id}&admin=1" target="_blank" style="font-weight:600;color:var(--gold);text-decoration:none">${p.title}</a></td>
    <td class="truncate">${p.address}, ${p.city}, ${p.state}</td>
    <td>${statusBadge(p.status)}</td>
    <td class="text-success">${CP.UI.fmt.currency(p.monthly_rent)}</td>
    <td>${p.bedrooms||0}bd / ${p.bathrooms||0}ba</td>
    <td class="text-muted">${p.views_count||0}</td>
    <td class="text-muted">${p.applications_count||0}</td>
    <td class="text-muted">${p.landlords?.business_name||p.landlords?.contact_name||'—'}</td>
    <td class="text-muted">${CP.UI.fmt.date(p.created_at)}</td>
    <td><select onchange="changeStatus('${p.id}',this.value)" style="font-size:12px;padding:3px 6px;border:1px solid #ccc;border-radius:4px;cursor:pointer">
      <option value="">— Action —</option>
      <option value="active">✅ Publish</option>
      <option value="draft">📝 Draft</option>
      <option value="paused">⏸ Pause</option>
      <option value="rented">🏠 Rented</option>
      <option value="archived">🗄 Archive</option>
    </select></td>
  </tr>`).join('');
}
</script>
<script>
// Mobile sidebar toggle
(function(){
  var btn = document.getElementById('menuBtn');
  var sidebar = document.getElementById('adminSidebar');
  var overlay = document.getElementById('sidebarOverlay');
  if(!btn) return;
  function open(){ sidebar.classList.add('open'); overlay.classList.add('open'); }
  function close(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); }
  btn.addEventListener('click', open);
  overlay.addEventListener('click', close);
  // sidebarToggle marker
})();
</script>
</body></html>
